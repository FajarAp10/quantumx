<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantumX Dashboard</title>

<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Inter", sans-serif;
}

body{
  background:#050505;
  color:#fff;
  padding:25px;
  min-height:100vh;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(5px); }
  to { opacity:1; transform:translateY(0); }
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.header h1{
  font-size:30px;
  font-weight:800;
  letter-spacing:1px;
  background:linear-gradient(90deg,#5bbcff,#8fd8ff);
  -webkit-background-clip:text;
  color:transparent;
  text-shadow:0 0 15px rgba(91,188,255,0.4);
}

/* LOGOUT BUTTON */
.logout{
  background:#ff3b3b;
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-weight:600;
  transition:0.25s;
  box-shadow:0 0 12px rgba(255,60,60,0.3);
}
.logout:hover{
  background:#ff4d4d;
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,60,60,0.5);
}

/* CARD */
.card{
  background:rgba(20,20,25,0.6);
  padding:25px;
  border-radius:18px;
  border:1px solid rgba(60,120,255,0.15);
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(0,0,0,0.45);
  margin-bottom:28px;
  transition:0.3s;
}

.card:hover{
  border-color:#3b82f6;
  box-shadow:0 0 25px rgba(59,130,246,0.3);
}

.card h2{
  margin-bottom:18px;
  font-size:20px;
  font-weight:700;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  background:#0d0f12;
  border:1px solid #222;
  color:white;
  font-size:15px;
  transition:0.2s;
}

input:focus{
  border-color:#3b82f6;
  outline:none;
  background:#11131a;
  box-shadow:0 0 12px rgba(59,130,246,0.25);
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  background:linear-gradient(90deg,#3b82f6,#60a5fa);
  border:none;
  color:white;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
}

.btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 18px rgba(59,130,246,0.45);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th{
  background:#12141a;
  padding:14px;
  text-align:left;
  border-bottom:1px solid #2a2a2a;
  color:#8ab8ff;
  font-weight:700;
  font-size:15px;
  letter-spacing:0.5px;
}

td{
  padding:14px;
  border-bottom:1px solid #1b1b1b;
  color:#e8e8e8;
}

tr{
  transition:0.2s;
}

tr:hover td{
  background:#0f1118;
  color:#a7caff;
}

/* RESPONSIVE */
@media(max-width:600px){
  .header h1{ font-size:24px; }
  .card{ padding:20px; }
}
</style>
</head>



<body>

<div class="header">
  <h1>QuantumX Admin Dashboard</h1>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="card">
  <h2>Tambah / Update Limit User</h2>

  <input id="userId" placeholder="User ID (contoh: web-user-xxxx)">
  <input id="newLimit" placeholder="Limit baru (angka)">
  
  <button class="btn" onclick="updateLimit()">Simpan</button>
</div>

<div class="card">
  <h2>Daftar User & Limit</h2>
  <table id="userTable">
    <tr>
      <th>User ID</th>
      <th>Limit</th>
    </tr>
  </table>
</div>

<script>
if (localStorage.getItem("admin") !== "true") {
  window.location.href = "login.html";
}

const SERVER = "http://localhost:3000";

async function loadUsers() {
  const res = await fetch(`${SERVER}/api/users`);
  const data = await res.json();

  const table = document.getElementById("userTable");
  table.innerHTML = `
    <tr>
      <th>User ID</th>
      <th>Limit</th>
    </tr>
  `;

  for (const id in data) {
    table.innerHTML += `
      <tr>
        <td>${id}</td>
        <td>${data[id]}</td>
      </tr>
    `;
  }
}

async function updateLimit() {
  const id = document.getElementById("userId").value.trim();
  const limit = document.getElementById("newLimit").value.trim();

  if (!id || !limit) return alert("Isi lengkap!");

  await fetch(`${SERVER}/api/setlimit`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ id, limit })
  });

  alert("Limit disimpan!");
  loadUsers();
}

function logout() {
  localStorage.removeItem("admin");
  window.location.href = "login.html";
}

loadUsers();
</script>

</body>
</html>
